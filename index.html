<!doctype html>
<html lang="en" data-theme="scholar">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocabion</title>
    <!-- Apply stored theme and mode before first render to avoid a flash -->
    <script>
      (function () {
        var theme = localStorage.getItem('vocabion-theme');
        if (theme && ['scholar', 'slate', 'forest'].indexOf(theme) !== -1) {
          document.documentElement.dataset.theme = theme;
        }
        var mode = localStorage.getItem('vocabion-mode');
        if (mode === 'dark') {
          document.documentElement.dataset.mode = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
